name: Telegram Commit Notification

on:
  push:
    branches:
      - main
      - master

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for diff)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute changed files count
        id: diff
        shell: bash
        run: |
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.sha }}"

          if [[ "$BEFORE" =~ ^0+$ ]]; then
            COUNT="$(git show --name-only --pretty="" "$AFTER" | sed '/^\s*$/d' | wc -l | tr -d ' ')"
          else
            COUNT="$(git diff --name-only "$BEFORE" "$AFTER" | sed '/^\s*$/d' | wc -l | tr -d ' ')"
          fi

          echo "count=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Send Telegram message on push
        uses: appleboy/telegram-action@v1.0.1
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_ID }}
          format: html 
          disable_web_page_preview: true
          message: |
            <b>New push</b> to ${{ github.repository }}
            <b>Author:</b> ${{ github.actor }}
            <b>Message:</b> ${{ github.event.head_commit.message }}
            <b>Files changed:</b> ${{ steps.diff.outputs.count }}
            <b>View commit:</b> <a href="https://github.com/${{ github.repository }}/commit/${{ github.sha }}">Open commit</a>
            <b>Bonus:</b> <a href="https://www.youtube.com/watch?v=dQw4w9WgXcQ">Important update</a>